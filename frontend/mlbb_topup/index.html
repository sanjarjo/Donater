<!DOCTYPE html>
<html>
<head>
    <title>MLBB TopUp</title>
</head>
<body>
    <div id="main_panel">
        <h2>Buyurtma berish</h2>
        <input id="player_id" placeholder="Player ID"/>
        <input id="zone_id" placeholder="Zone ID"/>
        <input id="nickname" placeholder="Nick"/>
        <input id="diamond" placeholder="Diamond"/>
        <input id="price" placeholder="Price"/>
        <button id="order_btn">Zakaz berish</button>
    </div>

    <div id="orders_panel">
        <h2>Buyurtmalarim</h2>
        <ul id="orders_list"></ul>
    </div>

    <script>
        const tg = window.Telegram.WebApp; // Telegram Mini App
        const tg_user = tg.initDataUnsafe.user; // {id, username}

        async function registerUser() {
            await fetch("https://yourdomain.com/tg_webhook", {
                method: "POST",
                headers: {"Content-Type": "application/json"},
                body: JSON.stringify({action:"register", user: tg_user})
            });
        }

        document.getElementById("order_btn").onclick = async () => {
            const payload = {
                player_id: document.getElementById("player_id").value,
                zone_id: document.getElementById("zone_id").value,
                nickname: document.getElementById("nickname").value,
                diamond: parseInt(document.getElementById("diamond").value),
                price: parseInt(document.getElementById("price").value)
            };

            const res = await fetch("https://yourdomain.com/tg_webhook", {
                method: "POST",
                headers: {"Content-Type": "application/json"},
                body: JSON.stringify({action:"create_order", user: tg_user, payload})
            });
            const data = await res.json();
            if(data.status === "ok"){
                alert("Buyurtma qabul qilindi! №" + data.order_number);
            }
        }

        registerUser();
    </script>
</body>
</html>
